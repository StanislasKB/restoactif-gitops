name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/restoactif-gitops:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/restoactif-gitops:${{ github.sha }}
      
      - name: Update GitOps repo
        uses: actions/checkout@v4
        with:
          repository: StanislasKB/laravel-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
      
      - name: Update image tag
        run: |
          cd gitops
          sed -i "s|image: .*/restoactif-gitops:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/restoactif-gitops:${{ github.sha }}|" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes"
          git push